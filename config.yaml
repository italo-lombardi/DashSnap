name: DashSnap
version: "0.0.1"
slug: dashsnap
description: >
  Record or screenshot any web page via headless Chromium — Home Assistant dashboards, Grafana, and more.
  When running as an HA add-on, configure a single target via base_url + token below.
  For multi-target setups (e.g. HA + Grafana), run via Docker and use a full options.json with a targets list.
arch:
  - aarch64
  - amd64
init: false
boot: manual
map:
  - media:rw
ports:
  8099/tcp: 8099
options:
  base_url: "http://homeassistant.local:8123"
  token: ""
  auth_strategy: "ha_token"
schema:
  base_url: str
  token: password
  auth_strategy: str?
