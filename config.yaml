name: DashSnap
version: "0.0.3"
slug: dashsnap
description: >-
  Screenshot or record any web page via headless Chromium. Supports HA, Grafana, and public pages. See README for setup.
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
init: false
boot: manual
map:
  - media:rw
ports:
  8099/tcp: 8099
options:
  base_url: "http://homeassistant.local:8123"
  token: ""
  targets_json: ""
schema:
  base_url: str?
  token: password?
  targets_json: str?
