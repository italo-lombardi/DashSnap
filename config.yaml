name: DashSnap
version: "0.1.7"
slug: dashsnap
description: >-
  Screenshot or record any web page via headless Chromium. Supports HA, Grafana, and public pages. See README for setup.
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:monitor-screenshot
panel_title: DashSnap
init: false
boot: manual
map:
  - media:rw
ports:
  8099/tcp: 8099
