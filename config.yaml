name: DashSnap
version: "0.0.1"
slug: dashsnap
description: >
  Record or screenshot any web page via headless Chromium.

  SINGLE TARGET (HA only): set base_url to your HA URL (e.g. http://homeassistant.local:8123)
  and token to a long-lived access token (HA Profile → Long-lived access tokens).
  Leave targets_json empty.

  MULTI-TARGET (HA + Grafana + public pages): leave base_url and token empty,
  paste a JSON array into targets_json. Example:
  [{"name":"ha","base_url":"http://homeassistant.local:8123","auth":{"strategy":"ha_token","token":"eyJ..."}},
  {"name":"grafana","base_url":"https://grafana.example.com","auth":{"strategy":"http_header","headers":{"Authorization":"Bearer glsa_xxx"}}},
  {"name":"public","base_url":"https://example.com","auth":{"strategy":"none"}}]
arch:
  - aarch64
  - amd64
init: false
boot: manual
map:
  - media:rw
ports:
  8099/tcp: 8099
options:
  base_url: "http://homeassistant.local:8123"
  token: ""
  targets_json: ""
schema:
  base_url: str?
  token: password?
  targets_json: str?
