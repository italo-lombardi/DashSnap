# Run DashSnap as a plain Docker container (no HA supervisor).
#
#   1. cp options.sample.json options.json  &&  edit it
#   2. docker compose up --build
#   3. curl http://localhost:8099/health
#
# Output folder:
#   By default recordings go to ./recordings/ next to this file.
#   Change the left side of the volume mount to any folder you want:
#
#     - ~/Downloads:/media/DashSnap        # save to Downloads
#     - /mnt/nas/DashSnap:/media/DashSnap  # save to NAS
#
services:
  dashsnap:
    build: .
    container_name: dashsnap
    ports:
      - "8099:8099"
    volumes:
      - ./options.json:/data/options.json:ro
      - ./recordings:/media/DashSnap   # ← change left side to redirect output
    # host.docker.internal lets DashSnap reach a service running on the Docker host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
